<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proov — live workflow monitor</title>
<script src="https://unpkg.com/bpmn-js@17.11.1/dist/bpmn-navigated-viewer.production.min.js"></script>
<style>
  :root{--bg:#0e1117;--panel:#161b22;--line:#30363d;--fg:#e6edf3;--mut:#8b949e;--acc:#2f81f7;--ok:#3fb950;--bad:#f85149;--warn:#d29922}
  *{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;display:flex;flex-direction:column}
  header{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0} .dot{width:9px;height:9px;border-radius:50%;background:var(--bad);box-shadow:0 0 8px var(--bad)} .dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .meta{color:var(--mut);font-size:12.5px} .meta b{color:var(--fg)} .pill{padding:2px 9px;border:1px solid var(--line);border-radius:20px}
  .status{margin-left:auto;font-weight:700;padding:3px 11px;border-radius:20px;background:#21262d}
  .status.pass{color:var(--ok)}.status.fail{color:var(--bad)}.status.soft{color:#58a6ff}.status.unverified{color:var(--warn)}.status.running{color:var(--acc)}
  main{flex:1;display:flex;min-height:0}
  #canvas{flex:1;background:#fbfdff;min-width:0}
  aside{width:360px;border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .cur{padding:12px 16px;border-bottom:1px solid var(--line)} .cur .lbl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.05em} .cur .step{font-size:17px;font-weight:700;margin-top:3px}
  .log{flex:1;overflow:auto;padding:6px 0}
  .ev{padding:6px 16px;border-bottom:1px solid #1c222b;display:flex;gap:9px;align-items:baseline;font-size:12.5px}
  .ev .ty{color:var(--mut);min-width:74px;font-variant:tabular-nums} .ev .tx{flex:1;word-break:break-word} .ev .t{color:#566;font-size:11px}
  .ev.gate .ty{color:var(--warn)} .ev.tool_start .ty,.ev.tool_result .ty{color:var(--acc)} .ev.done .ty{color:var(--ok)} .ev.stop .ty{color:var(--bad)} .ev.round .ty{color:#a371f7} .ev.verify .ty{color:#58a6ff}
  .bar{padding:8px 16px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center} button{background:#21262d;color:var(--fg);border:1px solid var(--line);border-radius:7px;padding:5px 10px;cursor:pointer}
  /* BPMN highlight markers */
  .djs-element.s-active .djs-visual>:nth-child(1){stroke:#2f81f7!important;stroke-width:3.5px!important;fill:#cfe3ff!important}
  .djs-element.s-active .djs-visual>text{fill:#0b3d91!important}
  .djs-element.s-visited .djs-visual>:nth-child(1){stroke:#3fb950!important}
  .djs-element.s-failed .djs-visual>:nth-child(1){stroke:#f85149!important;stroke-width:3px!important;fill:#ffd7d5!important}
  @keyframes pulse{0%,100%{stroke-width:3px}50%{stroke-width:6px}} .djs-element.s-active .djs-visual>:nth-child(1){animation:pulse 1.1s ease-in-out infinite}
</style></head>
<body>
<header>
  <span id="dot" class="dot"></span><h1>Proov · live workflow monitor</h1>
  <span class="meta pill" id="task">waiting for a run…</span>
  <span class="meta pill">run <b id="run">—</b></span>
  <span class="meta pill">round <b id="round">—</b></span>
  <span class="meta pill">events <b id="count">0</b></span>
  <span class="status running" id="status">idle</span>
</header>
<main>
  <div id="canvas"></div>
  <aside>
    <div class="cur"><div class="lbl">current step</div><div class="step" id="curstep">—</div><div class="meta" id="curdetail"></div></div>
    <div class="log" id="log"></div>
    <div class="bar"><button id="fit">Fit diagram</button><button id="clear">Clear log</button><span class="meta" id="conn">connecting…</span></div>
  </aside>
</main>
<script>
  const STEP_NAME = { start:"Task submitted", sess:"Session created", genRef:"Design-first: draw reference", model:"Model call → tool", gwValid:"Valid tool call?", gwDone:"done?", gwPlan:"Plan-first gate", nPlan:"Nudge: plan first", appr:"Approval gate", exec:"Execute tool", guards:"Post-tool guards", g1:"Open tasks?", g2:"Per-task checks", g3:"Task-fidelity", g4:"Visual-match / beyond-frame", g5:"Game gate", g6:"Project-checks", accept:"Accept done", fv:"FINAL VERIFY", gwV:"verification passed?", succ:"SUCCESS — verified", stopE:"Stopped", remediate:"FAIL → new checklist of fixes" };
  let viewer, canvasApi, active = null, count = 0, curRun = null;

  async function boot(){
    viewer = new BpmnJS({ container:"#canvas" });
    const xml = await (await fetch("/workflow.bpmn")).text();
    await viewer.importXML(xml);
    canvasApi = viewer.get("canvas"); canvasApi.zoom("fit-viewport");
    connect();
  }
  document.getElementById("fit").onclick = ()=>canvasApi && canvasApi.zoom("fit-viewport");
  document.getElementById("clear").onclick = ()=>{ document.getElementById("log").innerHTML=""; };

  function mark(step, cls){ try{ canvasApi.addMarker(step, cls); }catch(e){} }
  function unmark(step, cls){ try{ canvasApi.removeMarker(step, cls); }catch(e){} }

  function highlight(evt){
    const step = evt.step; if(!step) return;
    if(active && active!==step){ unmark(active,"s-active"); mark(active,"s-visited"); }
    active = step;
    mark(step,"s-active");
    if(evt.type==="gate" || evt.type==="stop" || (evt.type==="tool_result" && evt.ok===false)) mark(step,"s-failed");
    document.getElementById("curstep").textContent = STEP_NAME[step] || step;
    document.getElementById("curdetail").textContent = evt.detail || evt.tool || evt.summary || "";
  }

  function statusOf(evt){
    if(evt.type==="done") return evt.status||"pass";
    if(evt.type==="stop") return evt.status||"unverified";
    if(evt.type==="run_start"||evt.type==="round") return "running";
    return null;
  }

  function onEvent(evt){
    if(evt.runId && evt.runId!==curRun){ // a new run resets the board
      curRun = evt.runId;
      ["s-active","s-visited","s-failed"].forEach(c=>document.querySelectorAll(".djs-element."+c).forEach(el=>el.classList.remove(c)));
      active=null; document.getElementById("run").textContent = String(curRun).slice(0,12);
    }
    count++; document.getElementById("count").textContent = count;
    document.getElementById("dot").classList.add("on");
    if(evt.type==="run_start") document.getElementById("task").textContent = evt.task || "(run)";
    if(evt.type==="round") document.getElementById("round").textContent = evt.n;
    const st = statusOf(evt);
    if(st){ const el=document.getElementById("status"); el.className="status "+st; el.textContent = (evt.type==="done"||evt.type==="stop")?(st+(evt.outcome?" · "+evt.outcome:"")):st; }
    highlight(evt);
    // log line
    const div=document.createElement("div"); div.className="ev "+evt.type;
    const tx = evt.type==="tool_start"?("→ "+evt.tool): evt.type==="tool_result"?(evt.tool+(evt.ok===false?" ✗":" ✓")): evt.type==="gate"?("gate "+(evt.gate||"")+" ✗"+(evt.detail?" — "+evt.detail:"")): evt.type==="round"?("round "+evt.n): evt.type==="done"?("DONE "+(evt.status||"")): evt.type==="stop"?("STOP "+(evt.outcome||"")): evt.type==="verify"?("verify "+(evt.ok?"✓":"✗")): (evt.task||evt.detail||"");
    div.innerHTML = '<span class="ty">'+evt.type+'</span><span class="tx">'+escapeHtml(tx)+'</span><span class="t">'+new Date(evt.ts||Date.now()).toLocaleTimeString().slice(0,8)+'</span>';
    const log=document.getElementById("log"); log.prepend(div); while(log.children.length>300) log.lastChild.remove();
  }
  function escapeHtml(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  function connect(){
    const es = new EventSource("/events");
    es.onopen = ()=>{ document.getElementById("conn").textContent="● connected"; };
    es.onerror = ()=>{ document.getElementById("conn").textContent="● reconnecting…"; document.getElementById("dot").classList.remove("on"); };
    es.onmessage = (m)=>{ try{ onEvent(JSON.parse(m.data)); }catch(e){} };
  }
  boot();
</script>
</body></html>
